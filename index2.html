<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>for you xajji</title>

    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500&family=Poppins:wght@300;400&display=swap">
    <style>
        body {
            margin: 0;
            font-family:'Poppins',sans-serif;
            background:linear-gradient(to right, #f5efe6, #e8d8c4) ;
            display: flex;
            justify-content: centre;
            align-items: centre;
            height: 100vh;
            overflow: hidden;
        }
        .container {
            background: #fffaf5;
            padding: 40px;
            border-radius: 25px;
            box-shadow: 0 15px 30px rgba(0,0,0,0.1);
            max-width: 420px;
            text-align: centre;
            position: relative;
            z-index: 2;
        }
        h1 {
            font-family: 'Playfair Display', serif;
            color: #6b4f3b;
        }
        p { color: #5c4b3b; font-size: 16px;}
        .typing {
            border-right: 2px solid #6b4f3b;
            display: inline-block;
            white-space: nowrap;
            overflow: hidden;
            animation: blink 0.7s infinite;
        }

        @keyframes blink { 50% { border-color: transparent; } }
        button{
            margin: 10px;
            padding: 12px 22px;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            cursor: pointer;
            transition: 0.3s;
        }


        #yesBtn { background-color: #6b4f3b; color: white;}
        #noBtn { background-color: #ddd; }

        .hidden { display: none; }

        .heart{
            position: absolute;
            font-size: 20px;
            animation: floatUp 5s linear infinite;
            opacity: 0.7s;
        }

        @keyframes floatUp {
            0% { transform: translateY(100vh); opacity: 0; }
            50%{ opacity: 1; }
            100%{ transform: translateY(-10vh); opacity: 0; }
        }
    </style>
</head>
<body>
  <div class="container">

    </div>

        function createHearts(count) {
            for (let i = 0; i <count; i++) {

</body>
</html>
